# Production overlay: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build`
#
# Adds what a bare dev `docker compose up` doesn't need: the nginx reverse
# proxy (+ certbot for its certificates), log rotation so containers can't
# fill the disk, and healthchecks for the app's own services (postgres/
# redis already have theirs in the base file).
#
# Doesn't touch bot/api/admin-panel's existing port bindings — nginx is the
# intended public entry point, but the safest way to guarantee "only 80/443
# reachable from the internet" is the host firewall (see README), not
# fighting docker-compose's list-merging rules for `ports:`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    logging: *default-logging

  redis:
    logging: *default-logging

  migrations:
    logging: *default-logging

  bot:
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin-panel:
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
      - admin-panel
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

  # First-time cert issuance (run once, after nginx is up so the ACME
  # HTTP-01 challenge on port 80 is reachable):
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d api.domain.uz -d panel.domain.uz \
  #     --email you@example.com --agree-tos --no-eff-email
  # Renewal (cron this on the host, e.g. weekly):
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot renew
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml exec nginx nginx -s reload
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  certbot_webroot:
  certbot_certs:
