# Reverse proxy for the two public services (FastAPI and the Next.js admin
# panel). This is the *only* thing meant to be reachable from the internet
# in production — everything else (postgres/redis/prometheus/grafana, and
# the bot/api containers' own ports) should stay bound to 127.0.0.1 or be
# blocked at the host firewall; see the README's Deploy section.
#
# Replace api.domain.uz / panel.domain.uz with your real domains before use.

# --- HTTP: ACME challenge for certbot, redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.domain.uz panel.domain.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- api.domain.uz -> FastAPI (api:8000) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.domain.uz;

    # Obtain these once with: docker compose run --rm certbot certonly
    # --webroot -w /var/www/certbot -d api.domain.uz (see README).
    ssl_certificate /etc/letsencrypt/live/api.domain.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.domain.uz/privkey.pem;

    # Prometheus scrapes this over the compose network directly — never
    # expose it on the public listener.
    location /metrics {
        deny all;
    }

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- panel.domain.uz -> Next.js admin panel (admin-panel:3000) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panel.domain.uz;

    ssl_certificate /etc/letsencrypt/live/panel.domain.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.domain.uz/privkey.pem;

    location / {
        proxy_pass http://admin-panel:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
