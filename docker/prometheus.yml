global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: movie_platform_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: movie_platform_bot
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:9100"]
