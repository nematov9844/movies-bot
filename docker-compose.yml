services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  migrations:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - ./alembic/versions:/app/alembic/versions
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    # Host networking (Linux-only) so the bot can reach the host's own
    # Ollama instance at 127.0.0.1:11434 for AI-assisted caption parsing —
    # Ollama stays bound to loopback-only on the host itself (never
    # rebound to 0.0.0.0 or the docker bridge), so this is the only way in
    # without widening Ollama's own exposure. Overrides below repoint
    # POSTGRES_HOST/REDIS_HOST at the host-published ports instead of the
    # compose-network service names, since this container is no longer on
    # that bridge network. Trade-off: prometheus.yml's `bot:9100` scrape
    # target (the "monitoring" profile, not on by default) would need to
    # become `127.0.0.1:9100` reachable from the host side too if that
    # profile is ever turned on.
    network_mode: host
    environment:
      POSTGRES_HOST: localhost
      REDIS_HOST: localhost
      OLLAMA_BASE_URL: http://127.0.0.1:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: python -m app.bot_main

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: uvicorn app.api_main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  admin-panel:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Next.js's standalone server.js binds to $HOSTNAME if set, falling
      # back to 0.0.0.0 otherwise — but Docker always injects HOSTNAME as
      # the container's own short ID, which isn't a resolvable DNS name,
      # so the server crash-loops on "getaddrinfo EAI_AGAIN <container-id>"
      # unless this is pinned explicitly.
      HOSTNAME: "0.0.0.0"
    depends_on:
      - api
    ports:
      - "3005:3000"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
